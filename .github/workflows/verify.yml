name: V&V Tests

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  unit-tests:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ['3.9', '3.10', '3.11', '3.12']
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
      - run: pip install -e "tools/[dev]"
      - run: python -m pytest tools/tests/ -v --tb=short --ignore=tools/tests/test_import.py --ignore=tools/tests/test_regression.py

  validate-cases:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - run: pip install -e "tools/[dev]"
      - run: cfdvv benchmark

  smoke-tests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - run: pip install -e "tools/[dev]"
      - run: |
          cfdvv --version
          cfdvv list
          cfdvv validate cases/verification/incompressible/poiseuille-2d
          cfdvv info cases/verification/incompressible/poiseuille-2d
          cfdvv example-output cases/verification/incompressible/poiseuille-2d
          cfdvv compare cases/verification/incompressible/poiseuille-2d \
            -r cases/verification/incompressible/poiseuille-2d/reference/analytical/solution.csv \
            --no-plot --tolerance 1e-10

  openfoam-tests:
    runs-on: ubuntu-latest
    container:
      image: openfoam/openfoam11-paraview510:latest
    steps:
      - uses: actions/checkout@v4
      - name: Setup Python
        run: |
          sudo apt-get update && sudo apt-get install -y --no-install-recommends python3-pip
          pip3 install --upgrade pip setuptools wheel
          pip3 install tools/
      - name: Test Poiseuille (simpleFoam)
        continue-on-error: true
        run: |
          set +e
          . $(find / -name bashrc -path "*/openfoam*" 2>/dev/null | head -1)
          cd cases/verification/incompressible/poiseuille-2d/openfoam
          blockMesh && simpleFoam
          ls -R postProcessing || echo "no postProcessing dir"
          RESULT=$(find postProcessing -type f \( -name "*.csv" -o -name "*.xy" \) 2>/dev/null | sort -t/ -k3 -n | tail -1)
          echo "Result file: $RESULT"
          if [ -n "$RESULT" ]; then
            sed -i 's/U:0/u/g; s/U:1/v/g; s/U:2/w/g; s/U_x/u/g; s/U_y/v/g; s/U_z/w/g' "$RESULT" 2>/dev/null || true
            cfdvv compare .. -r "$RESULT" --no-plot
          else
            echo "ERROR: no result file found"
          fi
      - name: Test Couette (simpleFoam)
        continue-on-error: true
        run: |
          set +e
          . $(find / -name bashrc -path "*/openfoam*" 2>/dev/null | head -1)
          cd cases/verification/incompressible/couette-2d/openfoam
          blockMesh && simpleFoam
          ls -R postProcessing || echo "no postProcessing dir"
          RESULT=$(find postProcessing -type f \( -name "*.csv" -o -name "*.xy" \) 2>/dev/null | sort -t/ -k3 -n | tail -1)
          echo "Result file: $RESULT"
          if [ -n "$RESULT" ]; then
            sed -i 's/U:0/u/g; s/U:1/v/g; s/U:2/w/g; s/U_x/u/g; s/U_y/v/g; s/U_z/w/g' "$RESULT" 2>/dev/null || true
            cfdvv compare .. -r "$RESULT" --no-plot
          else
            echo "ERROR: no result file found"
          fi
      - name: Test Lid-Driven Cavity (simpleFoam)
        continue-on-error: true
        run: |
          set +e
          . $(find / -name bashrc -path "*/openfoam*" 2>/dev/null | head -1)
