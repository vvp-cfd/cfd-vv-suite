name: V&V Tests

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  unit-tests:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ['3.9', '3.10', '3.11', '3.12']
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
      - run: pip install -e "tools/[dev]"
      - run: python -m pytest tools/tests/ -v --tb=short --ignore=tools/tests/test_import.py --ignore=tools/tests/test_regression.py

  validate-cases:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - run: pip install -e "tools/[dev]"
      - run: cfdvv benchmark

  smoke-tests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - run: pip install -e "tools/[dev]"
      - run: |
          cfdvv --version
          cfdvv list
          cfdvv validate cases/verification/incompressible/poiseuille-2d
          cfdvv info cases/verification/incompressible/poiseuille-2d
          cfdvv example-output cases/verification/incompressible/poiseuille-2d
          cfdvv compare cases/verification/incompressible/poiseuille-2d \
            -r cases/verification/incompressible/poiseuille-2d/reference/analytical/solution.csv \
            --no-plot --tolerance 1e-10

  openfoam-tests:
    runs-on: ubuntu-latest
    container:
      image: openfoam/openfoam11-paraview510:latest
      options: --user root
    steps:
      - uses: actions/checkout@v4
      - name: Setup Python & create non-root user
        run: |
          apt-get update && apt-get install -y --no-install-recommends sudo python3-pip
          pip3 install --upgrade pip setuptools wheel
          pip3 install tools/
          useradd -m ofuser
          echo "ofuser ALL=(ALL) NOPASSWD:ALL" >> /etc/sudoers
          chown -R ofuser:ofuser .
      - name: Test Poiseuille (simpleFoam)
        continue-on-error: true
        run: |
          set +e
          . /opt/openfoam11/etc/bashrc
          CASE=cases/verification/incompressible/poiseuille-2d/openfoam
          sudo -u ofuser bash -c "source /opt/openfoam11/etc/bashrc && cd $PWD/$CASE && blockMesh && simpleFoam" || true
          cd $CASE
          ls -R postProcessing 2>/dev/null || echo "no postProcessing dir"
          RESULT=$(find postProcessing -type f \( -name "*.csv" -o -name "*.xy" \) 2>/dev/null | sort -t/ -k3 -n | tail -1)
          echo "Result file: $RESULT"
          if [ -n "$RESULT" ]; then
            sed -i 's/U:0/u/g; s/U:1/v/g; s/U:2/w/g; s/U_x/u/g; s/U_y/v/g; s/U_z/w/g' "$RESULT" 2>/dev/null || true
            cfdvv compare .. -r "$RESULT" --no-plot --tolerance 1e-3
          else
            echo "ERROR: no result file found"
          fi
          ART_DIR="$GITHUB_WORKSPACE/artifacts/poiseuille-2d"
          mkdir -p "$ART_DIR"
          cp -r postProcessing "$ART_DIR/" 2>/dev/null || true
          latest=$(ls -d [0-9]* 2>/dev/null | sort -n | tail -1)
          [ -n "$latest" ] && cp -r "$latest" "$ART_DIR/" 2>/dev/null || true
      - name: Test Couette (simpleFoam)
        continue-on-error: true
        run: |
          set +e
          . /opt/openfoam11/etc/bashrc
          CASE=cases/verification/incompressible/couette-2d/openfoam
          sudo -u ofuser bash -c "source /opt/openfoam11/etc/bashrc && cd $PWD/$CASE && blockMesh && simpleFoam" || true
          cd $CASE
          ls -R postProcessing 2>/dev/null || echo "no postProcessing dir"
          RESULT=$(find postProcessing -type f \( -name "*.csv" -o -name "*.xy" \) 2>/dev/null | sort -t/ -k3 -n | tail -1)
          echo "Result file: $RESULT"
          if [ -n "$RESULT" ]; then
            sed -i 's/U:0/u/g; s/U:1/v/g; s/U:2/w/g; s/U_x/u/g; s/U_y/v/g; s/U_z/w/g' "$RESULT" 2>/dev/null || true
            cfdvv compare .. -r "$RESULT" --no-plot --tolerance 1e-3
          else
            echo "ERROR: no result file found"
          fi
          ART_DIR="$GITHUB_WORKSPACE/artifacts/couette-2d"
          mkdir -p "$ART_DIR"
          cp -r postProcessing "$ART_DIR/" 2>/dev/null || true
          latest=$(ls -d [0-9]* 2>/dev/null | sort -n | tail -1)
          [ -n "$latest" ] && cp -r "$latest" "$ART_DIR/" 2>/dev/null || true
      - name: Test Lid-Driven Cavity (simpleFoam)
        continue-on-error: true
        run: |
          set +e
          . /opt/openfoam11/etc/bashrc
          CASE=cases/verification/incompressible/lid-driven-cavity/openfoam
          sudo -u ofuser bash -c "source /opt/openfoam11/etc/bashrc && cd $PWD/$CASE && blockMesh && simpleFoam" || true
          cd $CASE
          ls -R postProcessing 2>/dev/null || echo "no postProcessing dir"
          RESULT=$(find postProcessing -type f \( -name "*.csv" -o -name "*.xy" \) 2>/dev/null | sort -t/ -k3 -n | tail -1)
          echo "Result file: $RESULT"
          if [ -n "$RESULT" ]; then
            sed -i 's/U:0/u/g; s/U:1/v/g; s/U:2/w/g; s/U_x/u/g; s/U_y/v/g; s/U_z/w/g' "$RESULT" 2>/dev/null || true
            cfdvv compare .. -r "$RESULT" --no-plot --tolerance 0.001
          else
            echo "ERROR: no result file found"
          fi
          # Save artifacts: sampled CSV + solution fields
          ART_DIR="$GITHUB_WORKSPACE/artifacts/lid-driven-cavity"
          mkdir -p "$ART_DIR"
          cp -r postProcessing "$ART_DIR/" 2>/dev/null || true
          latest=$(ls -d [0-9]* 2>/dev/null | sort -n | tail -1)
          [ -n "$latest" ] && cp -r "$latest" "$ART_DIR/" 2>/dev/null || true
      - name: Test Taylor-Green (icoFoam)
        continue-on-error: true
        run: |
          set +e
          . /opt/openfoam11/etc/bashrc
          CASE=cases/verification/incompressible/taylor-green-vortex-2d/openfoam
          cd $CASE
          sudo -u ofuser bash -c "source /opt/openfoam11/etc/bashrc && cd $PWD && blockMesh" || true
          echo "=== TG debug ==="
          which python3; which python; pwd; ls -la scripts/
          echo "--- Before init ---"
          head -3 0/U
          PYTHON=python3; $PYTHON --version || PYTHON=python; $PYTHON --version
          $PYTHON -c "
import math, os, sys
nx=80; ny=80; L=2*math.pi; hx=L/nx; hy=L/ny; n=nx*ny
print(f'nx={nx} ny={ny} n={n}')
os.makedirs('0', exist_ok=True)
for fname, cls, dim, expr in [
    ('0/U', 'volVectorField', '[0 1 -1 0 0 0 0]',
     lambda xc,yc: '({:.10g} {:.10g} 0)'.format(-math.cos(xc)*math.sin(yc), math.sin(xc)*math.cos(yc))),
    ('0/p', 'volScalarField', '[0 2 -2 0 0 0 0]',
     lambda xc,yc: str(-0.25*(math.cos(2*xc)+math.cos(2*yc)))),
]:
    lines = [
        'FoamFile { version 2.0; format ascii; class ' + cls + '; object ' + os.path.basename(fname) + '; }',
        'dimensions ' + dim + ';',
        'internalField nonuniform List<' + ('vector' if cls=='volVectorField' else 'scalar') + '> ' + str(n) + '(',
    ]
    for j in range(ny):
        for i in range(nx):
            lines.append(expr((i+0.5)*hx, (j+0.5)*hy))
    lines += [ ');', 'boundaryField {', '    cyc_x0  { type cyclic; }', '    cyc_x1  { type cyclic; }', '    cyc_y0  { type cyclic; }', '    cyc_y1  { type cyclic; }', '    frontAndBack { type empty; }', '}', '' ]
    with open(fname, 'w') as f: f.write(os.linesep.join(lines))
    sz = os.path.getsize(fname)
    print(f'Wrote {fname} ({sz} bytes)')
" 2>&1; echo "py_exit=$?"
echo "--- After init ---"
wc -c 0/U
head -2 0/U
echo "---"
          sudo -u ofuser bash -c "source /opt/openfoam11/etc/bashrc && cd $PWD && icoFoam" || true
          ls -R postProcessing 2>/dev/null || echo "no postProcessing dir"
          RESULT=$(find postProcessing -type f \( -name "*.csv" -o -name "*.xy" \) 2>/dev/null | sort -t/ -k3 -n | tail -1)
          echo "Result file: $RESULT"
          if [ -n "$RESULT" ]; then
            sed -i 's/U:0/u/g; s/U:1/v/g; s/U:2/w/g; s/U_x/u/g; s/U_y/v/g; s/U_z/w/g' "$RESULT" 2>/dev/null || true
            cfdvv compare .. -r "$RESULT" --no-plot --tolerance 0.01 --auto-generate
          else
            echo "ERROR: no result file found"
          fi
          ART_DIR="$GITHUB_WORKSPACE/artifacts/taylor-green-vortex-2d"
          mkdir -p "$ART_DIR"
          cp -r 0 "$ART_DIR/" 2>/dev/null || true
          cp -r postProcessing "$ART_DIR/" 2>/dev/null || true
          latest=$(ls -d [0-9]* 2>/dev/null | sort -n | tail -1)
          [ -n "$latest" ] && cp -r "$latest" "$ART_DIR/" 2>/dev/null || true
      - name: Test Sod (rhoPimpleFoam)
        continue-on-error: true
        run: |
          set +e
          . /opt/openfoam11/etc/bashrc
          CASE=cases/verification/compressible/sod-shock-tube/openfoam
          sudo -u ofuser bash -c "source /opt/openfoam11/etc/bashrc && cd $PWD/$CASE && blockMesh && setFields && rhoPimpleFoam" || true
          cd $CASE
          ls -R postProcessing 2>/dev/null || echo "no postProcessing dir"
          RESULT=$(find postProcessing -type f \( -name "*.csv" -o -name "*.xy" \) 2>/dev/null | sort -t/ -k3 -n | tail -1)
          echo "Result file: $RESULT"
          if [ -n "$RESULT" ]; then
            sed -i 's/U:0/u/g; s/U:1/v/g; s/U:2/w/g; s/U_x/u/g; s/U_y/v/g; s/U_z/w/g' "$RESULT" 2>/dev/null || true
            cfdvv compare .. -r "$RESULT" --no-plot --tolerance 0.05
          else
            echo "ERROR: no result file found"
          fi
          ART_DIR="$GITHUB_WORKSPACE/artifacts/sod-shock-tube"
          mkdir -p "$ART_DIR"
          cp -r postProcessing "$ART_DIR/" 2>/dev/null || true
          latest=$(ls -d [0-9]* 2>/dev/null | sort -n | tail -1)
          [ -n "$latest" ] && cp -r "$latest" "$ART_DIR/" 2>/dev/null || true
      - name: Upload OpenFOAM artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: openfoam-results
          path: artifacts/
