name: V&V Tests

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  unit-tests:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ['3.9', '3.10', '3.11', '3.12']
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
      - run: pip install -e "tools/[dev]"
      - run: python -m pytest tools/tests/ -v --tb=short --ignore=tools/tests/test_import.py --ignore=tools/tests/test_regression.py

  validate-cases:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - run: pip install -e "tools/[dev]"
      - run: cfdvv benchmark

  smoke-tests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - run: pip install -e "tools/[dev]"
      - run: |
          cfdvv --version
          cfdvv list
          cfdvv validate cases/verification/incompressible/poiseuille-2d
          cfdvv info cases/verification/incompressible/poiseuille-2d
          cfdvv example-output cases/verification/incompressible/poiseuille-2d
          cfdvv compare cases/verification/incompressible/poiseuille-2d \
            -r cases/verification/incompressible/poiseuille-2d/reference/analytical/solution.csv \
            --no-plot --tolerance 1e-10

  openfoam-tests:
    runs-on: ubuntu-latest
    container:
      image: openfoam/openfoam11-paraview510:latest
      options: --user root
    steps:
      - uses: actions/checkout@v4
      - name: Setup Python
        run: |
          apt-get update && apt-get install -y --no-install-recommends python3-pip
          pip3 install --upgrade pip setuptools wheel
          pip3 install tools/
      - name: Test Poiseuille (icoFoam)
        run: |
          OFRC=$(find / -name bashrc -path "*/openfoam*" 2>/dev/null | head -1)
          . "$OFRC"
          cd cases/verification/incompressible/poiseuille-2d/openfoam
          blockMesh && icoFoam
          postProcess -func sampleDict -latestTime 2>/dev/null || true
          RESULT=$(find postProcessing -name "*.csv" -o -name "*.xy" 2>/dev/null | head -1)
          [ -n "$RESULT" ] && cfdvv compare .. -r "$RESULT" --no-plot || echo "no result CSV"
      - name: Test Couette (icoFoam)
        run: |
          OFRC=$(find / -name bashrc -path "*/openfoam*" 2>/dev/null | head -1)
          . "$OFRC"
          cd cases/verification/incompressible/couette-2d/openfoam
          blockMesh && icoFoam
          postProcess -func sampleDict -latestTime 2>/dev/null || true
          RESULT=$(find postProcessing -name "*.csv" -o -name "*.xy" 2>/dev/null | head -1)
          [ -n "$RESULT" ] && cfdvv compare .. -r "$RESULT" --no-plot || echo "no result CSV"
      - name: Test Lid-Driven Cavity (icoFoam)
        run: |
          OFRC=$(find / -name bashrc -path "*/openfoam*" 2>/dev/null | head -1)
          . "$OFRC"
          cd cases/verification/incompressible/lid-driven-cavity/openfoam
          blockMesh && icoFoam
          postProcess -func sampleDict -latestTime 2>/dev/null || true
          RESULT=$(find postProcessing -name "*.csv" -o -name "*.xy" 2>/dev/null | head -1)
          [ -n "$RESULT" ] && cfdvv compare .. -r "$RESULT" --no-plot || echo "no result CSV"
      - name: Test Taylor-Green (icoFoam)
        run: |
          OFRC=$(find / -name bashrc -path "*/openfoam*" 2>/dev/null | head -1)
          . "$OFRC"
          cd cases/verification/incompressible/taylor-green-vortex-2d/openfoam
          blockMesh && icoFoam
          postProcess -func sampleDict -latestTime 2>/dev/null || true
          RESULT=$(find postProcessing -name "*.csv" -o -name "*.xy" 2>/dev/null | head -1)
          [ -n "$RESULT" ] && cfdvv compare .. -r "$RESULT" --no-plot || echo "no result CSV"
      - name: Test Sod (rhoCentralFoam)
        run: |
          OFRC=$(find / -name bashrc -path "*/openfoam*" 2>/dev/null | head -1)
          . "$OFRC"
          cd cases/verification/compressible/sod-shock-tube/openfoam
          blockMesh && rhoCentralFoam
          postProcess -func sampleDict -latestTime 2>/dev/null || true
          RESULT=$(find postProcessing -name "*.csv" -o -name "*.xy" 2>/dev/null | head -1)
          [ -n "$RESULT" ] && cfdvv compare .. -r "$RESULT" --no-plot || echo "no result CSV"
