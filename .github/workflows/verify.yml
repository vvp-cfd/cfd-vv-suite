name: V&V Tests

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  unit-tests:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ['3.9', '3.10', '3.11', '3.12']
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
      - run: pip install -e "tools/[dev]"
      - run: python -m pytest tools/tests/ -v --tb=short --ignore=tools/tests/test_import.py --ignore=tools/tests/test_regression.py

  validate-cases:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - run: pip install -e "tools/[dev]"
      - run: cfdvv benchmark

  smoke-tests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - run: pip install -e "tools/[dev]"
      - run: |
          cfdvv --version
          cfdvv list
          cfdvv validate cases/verification/incompressible/poiseuille-2d
          cfdvv info cases/verification/incompressible/poiseuille-2d
          cfdvv example-output cases/verification/incompressible/poiseuille-2d
          cfdvv compare cases/verification/incompressible/poiseuille-2d \
            -r cases/verification/incompressible/poiseuille-2d/reference/analytical/solution.csv \
            --no-plot --tolerance 1e-10

  openfoam-tests:
    runs-on: ubuntu-latest
    container: openfoam/openfoam11-default:latest
    steps:
      - uses: actions/checkout@v4
      - run: |
          apt-get update && apt-get install -y --no-install-recommends python3-pip python3-numpy
          pip3 install -e tools/ --break-system-packages
          . /usr/lib/openfoam/openfoam11/etc/bashrc
          cd cases/verification/incompressible/poiseuille-2d/openfoam
          blockMesh
          icoFoam
          cfdvv compare ../.. -r ../reference/analytical/solution.csv --no-plot --tolerance 1e-8
