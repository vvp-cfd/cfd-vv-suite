          echo "Result file: $RESULT"
          if [ -n "$RESULT" ]; then
            sed -i 's/U:0/u/g; s/U:1/v/g; s/U:2/w/g; s/U_x/u/g; s/U_y/v/g; s/U_z/w/g' "$RESULT" 2>/dev/null || true
            cfdvv compare .. -r "$RESULT" --no-plot
          else
            echo "ERROR: no result file found"
          fi
      - name: Test Taylor-Green (icoFoam)
        continue-on-error: true
        run: |
          set +e
          . $(find / -name bashrc -path "*/openfoam*" 2>/dev/null | head -1)
          cd cases/verification/incompressible/taylor-green-vortex-2d/openfoam
          blockMesh && icoFoam
          ls -R postProcessing || echo "no postProcessing dir"
          RESULT=$(find postProcessing -type f \( -name "*.csv" -o -name "*.xy" \) 2>/dev/null | sort -t/ -k3 -n | tail -1)
          echo "Result file: $RESULT"
          if [ -n "$RESULT" ]; then
            sed -i 's/U:0/u/g; s/U:1/v/g; s/U:2/w/g; s/U_x/u/g; s/U_y/v/g; s/U_z/w/g' "$RESULT" 2>/dev/null || true
            cfdvv compare .. -r "$RESULT" --no-plot
          else
            echo "ERROR: no result file found"
          fi
      - name: Test Sod (foamRun shockFluid)
        continue-on-error: true
        run: |
          set +e
          . $(find / -name bashrc -path "*/openfoam*" 2>/dev/null | head -1)
          cd cases/verification/compressible/sod-shock-tube/openfoam
          blockMesh && setFields && foamRun -solver shockFluid
          ls -R postProcessing || echo "no postProcessing dir"
          RESULT=$(find postProcessing -type f \( -name "*.csv" -o -name "*.xy" \) 2>/dev/null | sort -t/ -k3 -n | tail -1)
          echo "Result file: $RESULT"
          if [ -n "$RESULT" ]; then
            sed -i 's/U:0/u/g; s/U:1/v/g; s/U:2/w/g; s/U_x/u/g; s/U_y/v/g; s/U_z/w/g' "$RESULT" 2>/dev/null || true
            cfdvv compare .. -r "$RESULT" --no-plot
          else
            echo "ERROR: no result file found"
          fi
