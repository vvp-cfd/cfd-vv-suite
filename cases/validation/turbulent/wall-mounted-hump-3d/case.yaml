id: wall-mounted-hump-3d
name: "NASA Wall-Mounted Hump (3D)"
category: validation
subcategory: turbulent
tags: [newtonian, turbulent, separation, hump, experimental, rans-validation, nasa, 3d]

physics:
  type: incompressible
  regime: turbulent
  convective: true
  equations: [continuity, rans]

dimension: 3D

reference:
  type: experimental
  solution: "3D hump with side walls: separation bubble with spanwise variation"
  source: "NASA CFDVAL2004 Case 3; 3D effects from side wall BL"

quantities:
  - name: Cp
    type: profile
    location: "hump surface at midspan"
    norm: L2

parameters:
  - name: Re_c
    description: "Reynolds number based on chord"
    default: 936000
  - name: Ar
    description: "Spanwise aspect ratio W/c"
    default: 4.0
mesh:
  type: "hexahedral, refined near hump"
  recommended: [50000]
  convergence_study: [[15000],[50000]]
  wall_refinement: true
  notes: "3D hump with side walls. Ar>=4." 

tolerances:
  L2: 0.05
  Linf: 0.15
