id: cylinder-re100
name: "Flow Past a Cylinder (Re=100, unsteady)"
category: validation
subcategory: laminar
tags: [newtonian, laminar, unsteady, bluff-body, cylinder, external-flow, experimental]

physics:
  type: incompressible
  regime: laminar
  convective: true
  equations: [continuity, navier-stokes]

dimension: 2D

reference:
  type: experimental
  solution: "Drag coefficient, recirculation length, surface Cp from experiments and high-resolution simulations"
  source: "Tritton (1959); Dennis & Chang (1970); Grove et al. (1964)"
  doi: "https://doi.org/10.1017/S0022112059000829"
  notes: "Unsteady flow with von Karman vortex street."

quantities:
  - name: Cd
    type: scalar
    location: "cylinder surface"
    norm: Relative_L2
  - name: St
    type: scalar
    location: "cylinder surface"
    norm: Relative_L2

parameters:
  - name: Re
    description: "Reynolds number based on diameter"
    default: 100
  - name: D
    description: "Cylinder diameter"
    default: 1.0
mesh:
  type: "O-grid (structured around cylinder)"
  recommended: [40000]
  convergence_study: [[10000],[40000],[120000]]
  wall_refinement: true
  notes: "O-grid. Unsteady: time step dt=0.005-0.01." 

tolerances:
  L2: 0.05
  Relative_L2: 0.05
  Linf: 0.15
